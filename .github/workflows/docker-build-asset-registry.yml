name: Docker Build — asset-registry-service

on:
  push:
    branches: [ "main" ]
    paths:
      - "asset-registry-service/**"
      - ".github/workflows/docker-build-asset-registry.yml"
    # Tag pushes (v1.0.0, ...) publish a versioned image (:v1.0.0)
    # alongside :latest so consumers can pin to a release. No `paths`
    # filter on the tag trigger -- a release tag should build the
    # image even if the tagged commit happens not to touch
    # asset-registry-service/** (the bundle still wants a versioned
    # image at every release cut).
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - "asset-registry-service/**"
      - ".github/workflows/docker-build-asset-registry.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# ADR-0028 Phase 1: canonical writer for public.asset_registry.
# Publishes ghcr.io/edgy-solutions/openddil/asset-registry-service:latest,
# which openddil-helm/openddil-demo/templates/hub.yaml pulls by tag.
# Stack repo also hosts the schema + atlas migrations, but those don't
# need a Docker image — only this service does.
jobs:
  build-asset-registry-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Always publish :latest. On a v* tag push, ALSO publish the
      # tag-versioned image so consumers can pin to a release.
      - name: Compute image tags
        id: tags
        run: |
          REG=ghcr.io/${{ github.repository_owner }}/openddil/asset-registry-service
          T="$REG:latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            T="$T,$REG:${{ github.ref_name }}"
          fi
          echo "tags=$T" >> "$GITHUB_OUTPUT"

      - name: Build asset-registry-service
        uses: docker/build-push-action@v4
        with:
          context: ./asset-registry-service
          file: ./asset-registry-service/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
